<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita SAT - Automatica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); min-height: 100vh; margin: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.5s ease-out; }
        .gradient-text { background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(30,27,75,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(99,102,241,0.2); border-radius: 16px; }
        .btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); border: none; color: white; font-weight: 600; padding: 14px; border-radius: 10px; width: 100%; cursor: pointer; font-size: 15px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-green { background: linear-gradient(135deg, #059669, #10b981); }
        .inp { width: 100%; padding: 12px 16px; background: rgba(15,23,42,0.7); border: 1px solid rgba(99,102,241,0.3); border-radius: 10px; color: white; font-size: 16px; }
        .inp:focus { outline: none; border-color: #818cf8; }
        .inp::placeholder { color: #475569; }
        .row { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:rgba(15,23,42,0.5); border:1px solid rgba(99,102,241,0.15); border-radius:10px; margin-bottom:8px; }
        .cbtn { background:rgba(99,102,241,0.15); border:none; color:#a5b4fc; padding:8px 12px; border-radius:8px; cursor:pointer; }
        .err { background:rgba(127,29,29,0.3); border:1px solid rgba(239,68,68,0.4); color:#fca5a5; padding:12px; border-radius:10px; font-size:14px; margin-bottom:16px; }
        .info { background:rgba(30,58,138,0.3); border:1px solid rgba(99,102,241,0.3); color:#a5b4fc; padding:12px; border-radius:10px; font-size:13px; }
        .ok { background:rgba(5,46,22,0.4); border:1px solid rgba(34,197,94,0.3); color:#86efac; padding:16px; border-radius:10px; }
        .dot { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
        .da { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white; }
        .dd { background:#059669; color:white; }
        .di { background:rgba(30,27,75,0.8); color:#475569; border:1px solid rgba(99,102,241,0.2); }
    </style>
</head>
<body>
<div id="app" style="padding:20px;max-width:580px;margin:0 auto;"></div>
<script>
const S={step:1,curp:'',data:null,mail:null,loading:false,err:'',copied:null,nom:'',ap1:'',ap2:''};
const set=u=>{Object.assign(S,u);render();};
async function valCurp(){
  const c=S.curp.trim().toUpperCase();set({loading:true,err:''});
  try{const r=await fetch('/api/validar-curp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({curp:c})});const d=await r.json();if(!r.ok){set({loading:false,err:d.error||'Error'});return;}set({loading:false,data:d.datos,step:2});}
  catch(e){set({loading:false,err:'Error: '+e.message});}
}
async function crearMail(){
  if(!S.nom.trim()||!S.ap1.trim()){set({err:'Nombre y apellido paterno requeridos'});return;}
  set({loading:true,err:''});
  try{const r=await fetch('/api/crear-correo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre:S.nom.trim(),apellidoPaterno:S.ap1.trim(),apellidoMaterno:S.ap2.trim(),fechaNacimiento:S.data.fechaNacimiento})});const d=await r.json();if(!r.ok){set({loading:false,err:d.error||'Error'});return;}set({loading:false,mail:d,step:3});}
  catch(e){set({loading:false,err:'Error: '+e.message});}
}
async function descargar(){
  try{const r=await fetch('/api/descargar-credenciales',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:S.mail.email,password:S.mail.password,nombre:S.nom.trim(),apellidoPaterno:S.ap1.trim(),apellidoMaterno:S.ap2.trim(),fechaNacimiento:S.data.fechaNacimiento,curp:S.curp.toUpperCase()})});const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='credenciales-sat.txt';a.click();URL.revokeObjectURL(u);set({step:4});}
  catch(e){set({err:'Error: '+e.message});}
}
function cp(t,k){navigator.clipboard.writeText(t);set({copied:k});setTimeout(()=>set({copied:null}),2000);}
function render(){
  const{step,curp,loading,err,data,mail,copied}=S;
  const dots=['CURP','Datos','Correo','Listo'];
  document.getElementById('app').innerHTML=`<div class="slide-up"><div style="text-align:center;margin-bottom:24px"><h1 style="font-size:32px;font-weight:700;margin:0" class="gradient-text">Cita SAT</h1><p style="color:#64748b;margin:4px 0 0;font-size:13px">Automatizacion inscripcion RFC</p></div><div style="display:flex;align-items:center;margin-bottom:20px">${dots.map((s,i)=>`<div style="display:flex;align-items:center;flex:1"><div style="display:flex;flex-direction:column;align-items:center;gap:3px"><div class="dot ${i+1<step?'dd':i+1===step?'da':'di'}">${i+1<step?'V':i+1}</div><span style="font-size:9px;color:${i+1<=step?'#a5b4fc':'#475569'}">${s}</span></div>${i<3?`<div style="flex:1;height:2px;background:${i+1<step?'#6366f1':'rgba(99,102,241,0.15)'};margin:0 4px 14px"></div>`:''}</div>`).join('')}</div>${err?`<div class="err">! ${err}</div>`:''}${step===1?`<div class="card" style="padding:24px"><h2 style="margin:0 0 4px;font-size:18px;color:white">Validar CURP</h2><p style="color:#64748b;font-size:12px;margin:0 0 14px">18 caracteres exactos</p><input class="inp" id="ci" type="text" maxlength="18" placeholder="ABCD870101HDFMNN09" value="${curp}" oninput="set({curp:this.value.toUpperCase()})" style="margin-bottom:8px;letter-spacing:2px" /><p style="color:#475569;font-size:11px;margin:0 0 14px">4 letras + 6 numeros + H/M + 5 letras + 2 caracteres</p><button class="btn" onclick="valCurp()" ${loading||curp.length<18?'disabled':''}>${loading?'Validando...':'Validar CURP'}</button></div>`:''}${step===2&&data?`<div class="card" style="padding:24px"><h2 style="margin:0 0 4px;font-size:18px;color:white">CURP Valido</h2><p style="color:#64748b;font-size:12px;margin:0 0 14px">Ingresa tu nombre para el correo</p><div class="row"><div><p style="color:#64748b;font-size:11px;margin:0">CURP</p><p style="margin:0;font-family:monospace;font-size:13px;font-weight:600;color:white">${curp.toUpperCase()}</p></div><button class="cbtn" onclick="cp('${curp.toUpperCase()}','c')">${copied==='c'?'OK':'Copiar'}</button></div><div class="row"><div><p style="color:#64748b;font-size:11px;margin:0">Fecha Nacimiento</p><p style="margin:0;font-weight:600;color:white">${data.fechaNacimiento}</p></div><button class="cbtn" onclick="cp('${data.fechaNacimiento}','f')">${copied==='f'?'OK':'Copiar'}</button></div><div class="row" style="margin-bottom:14px"><div><p style="color:#64748b;font-size:11px;margin:0">Sexo</p><p style="margin:0;font-weight:600;color:white">${data.sexo}</p></div></div><input class="inp" type="text" placeholder="Nombre(s)" style="margin-bottom:8px" oninput="set({nom:this.value})" /><input class="inp" type="text" placeholder="Apellido Paterno" style="margin-bottom:8px" oninput="set({ap1:this.value})" /><input class="inp" type="text" placeholder="Apellido Materno" style="margin-bottom:14px" oninput="set({ap2:this.value})" /><button class="btn" onclick="crearMail()" ${loading?'disabled':''}>${loading?'Generando...':'Generar Correo Atomic Mail'}</button></div>`:''}${step===3&&mail?`<div class="card" style="padding:24px"><h2 style="margin:0 0 4px;font-size:18px;color:white">Correo Generado</h2><p style="color:#64748b;font-size:12px;margin:0 0 14px">Usa estas credenciales en Atomic Mail y SAT</p><div class="ok" style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><p style="color:#86efac;font-size:11px;margin:0">Email</p><p style="margin:0;font-family:monospace;font-weight:700;word-break:break-all">${mail.email}</p></div><button class="cbtn" onclick="cp('${mail.email}','e')">${copied==='e'?'OK':'Copiar'}</button></div><div style="display:flex;justify-content:space-between;align-items:center"><div><p style="color:#86efac;font-size:11px;margin:0">Contrasena</p><p style="margin:0;font-family:monospace;font-weight:700">${mail.password}</p></div><button class="cbtn" onclick="cp('${mail.password}','p')">${copied==='p'?'OK':'Copiar'}</button></div></div><div class="info" style="margin-bottom:14px"><strong>Pasos:</strong><ol style="margin:6px 0 0 14px;padding:0;line-height:1.9;font-size:12px"><li>Crea cuenta: atomicmail.io/app/auth/sign-up</li><li>Ve a sat.gob.mx - Citas - Inscripcion RFC</li><li>Usa ${mail.email} en el formulario</li><li>Copia el codigo de Atomic Mail y pegalo en SAT</li></ol></div><button class="btn btn-green" onclick="descargar()">Descargar Credenciales TXT</button></div>`:''}${step===4?`<div class="card" style="padding:24px;text-align:center"><div style="font-size:56px;margin-bottom:10px">!</div><h2 style="margin:0 0 8px;font-size:22px" class="gradient-text">Listo!</h2><p style="color:#64748b;margin:0 0 16px">Credenciales descargadas correctamente.</p><div class="ok" style="text-align:left"><p style="margin:0 0 6px;font-weight:600">Completado:</p><ul style="margin:0;padding-left:16px;line-height:2;font-size:13px"><li>CURP validado</li><li>Correo: ${mail?.email||''}</li><li>Credenciales descargadas</li></ul></div></div>`:''}</div>`;
  if(step===1){const i=document.getElementById('ci');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}
}
render();
</script>
</body>
</html>
