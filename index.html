<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cita SAT - Automática</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        * { font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(to bottom right, #0f172a, #0e1f2e, #1a1a3e);
            min-height: 100vh;
        }

        .glow-effect {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-indicator {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }
        }

        .pulse-button {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icons
        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
        );

        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const AlertIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        );

        const DownloadIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const CheckCircleIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const LoaderIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="animate-spin">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 6v6l4 2"></path>
            </svg>
        );

        function SATCitaApp() {
            const [step, setStep] = useState(1);
            const [curp, setCurp] = useState('');
            const [curpData, setCurpData] = useState(null);
            const [emailData, setEmailData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(null);

            const validarCurp = async () => {
                setError('');
                setLoading(true);

                try {
                    const response = await fetch('/api/validar-curp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ curp: curp.toUpperCase() })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        setError(data.error || 'Error al validar CURP');
                        setLoading(false);
                        return;
                    }

                    setCurpData(data.datos);
                    setStep(2);
                } catch (err) {
                    setError('Error de conexión: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const crearCorreo = async () => {
                setError('');
                setLoading(true);

                try {
                    const response = await fetch('/api/crear-correo', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(curpData)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        setError(data.error || 'Error al crear correo');
                        setLoading(false);
                        return;
                    }

                    setEmailData(data);
                    setStep(3);
                } catch (err) {
                    setError('Error de conexión: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const descargarCredenciales = async () => {
                try {
                    const response = await fetch('/api/descargar-credenciales', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: emailData.email,
                            password: emailData.password,
                            nombre: curpData.nombre,
                            apellidoPaterno: curpData.apellidoPaterno,
                            apellidoMaterno: curpData.apellidoMaterno,
                            fechaNacimiento: curpData.fechaNacimiento,
                            curp: curp.toUpperCase()
                        })
                    });

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'credenciales-sat.txt';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);

                    setStep(4);
                } catch (err) {
                    setError('Error al descargar: ' + err.message);
                }
            };

            const copyToClipboard = (text, field) => {
                navigator.clipboard.writeText(text);
                setCopied(field);
                setTimeout(() => setCopied(null), 2000);
            };

            return (
                <div className="min-h-screen text-white p-4 md:p-8">
                    <div className="max-w-2xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-12 step-indicator">
                            <h1 className="text-4xl md:text-5xl font-bold mb-2">
                                <span className="gradient-text">Cita SAT</span>
                            </h1>
                            <p className="text-slate-400">Automatización completa de inscripción</p>
                        </div>

                        {/* Progreso */}
                        <div className="mb-10">
                            <div className="flex justify-between mb-4">
                                {[1, 2, 3, 4].map((s) => (
                                    <div key={s} className={`flex items-center justify-center w-10 h-10 rounded-full font-bold transition-all ${
                                        s <= step ? 'bg-blue-600 glow-effect' : 'bg-slate-700'
                                    }`}>
                                        {s < step ? <CheckCircleIcon /> : s}
                                    </div>
                                ))}
                            </div>
                            <div className="w-full bg-slate-700 h-1 rounded-full overflow-hidden">
                                <div 
                                    className="h-full bg-gradient-to-r from-blue-600 to-purple-600 transition-all duration-500"
                                    style={{ width: `${(step - 1) * 33.33}%` }}
                                />
                            </div>
                        </div>

                        {/* Paso 1: Validar CURP */}
                        {step === 1 && (
                            <div className="step-indicator bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-8 space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold mb-2">Paso 1: Validar CURP</h2>
                                    <p className="text-slate-400 text-sm">Ingresa tu CURP. Se validará contra rfc.gob.mx automáticamente</p>
                                </div>

                                <input
                                    type="text"
                                    value={curp}
                                    onChange={(e) => setCurp(e.target.value.toUpperCase())}
                                    placeholder="Ej: ABCD870101HDFMNN09"
                                    className="w-full px-4 py-3 rounded-lg bg-slate-700 border border-slate-600 text-white placeholder-slate-500 text-lg font-mono"
                                    maxLength={20}
                                />
                                <p className="text-xs text-slate-400">20 caracteres: 6 letras + 8 números (AAAAMMDD) + 6 caracteres</p>

                                {error && (
                                    <div className="flex items-center gap-3 p-4 rounded-lg bg-red-900/20 border border-red-700/50 text-red-200">
                                        <AlertIcon />
                                        <span className="text-sm">{error}</span>
                                    </div>
                                )}

                                <button
                                    onClick={validarCurp}
                                    disabled={loading || curp.length < 20}
                                    className="w-full py-3 px-4 rounded-lg font-bold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2"
                                >
                                    {loading ? <LoaderIcon /> : 'Validar CURP'}
                                </button>
                            </div>
                        )}

                        {/* Paso 2: Datos Extraídos */}
                        {step === 2 && curpData && (
                            <div className="step-indicator bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-8 space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold mb-2">Paso 2: Datos Validados ✓</h2>
                                    <p className="text-slate-400 text-sm">Se encontraron los siguientes datos en rfc.gob.mx</p>
                                </div>

                                <div className="space-y-3">
                                    {[
                                        { label: 'CURP', value: curp.toUpperCase() },
                                        { label: 'Nombre', value: curpData.nombre },
                                        { label: 'Apellido Paterno', value: curpData.apellidoPaterno },
                                        { label: 'Apellido Materno', value: curpData.apellidoMaterno },
                                        { label: 'Fecha de Nacimiento', value: curpData.fechaNacimiento },
                                        { label: 'RFC', value: curpData.rfc }
                                    ].map((item) => (
                                        <div key={item.label} className="flex items-center justify-between p-4 rounded-lg bg-slate-700/50 border border-slate-600">
                                            <div>
                                                <p className="text-slate-400 text-sm">{item.label}</p>
                                                <p className="font-mono font-bold">{item.value}</p>
                                            </div>
                                            <button
                                                onClick={() => copyToClipboard(item.value, item.label)}
                                                className="p-2 hover:bg-slate-600 rounded transition-all"
                                            >
                                                {copied === item.label ? (
                                                    <span className="text-green-400"><CheckIcon /></span>
                                                ) : (
                                                    <span className="text-slate-400"><CopyIcon /></span>
                                                )}
                                            </button>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={crearCorreo}
                                    disabled={loading}
                                    className="w-full py-3 px-4 rounded-lg font-bold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:shadow-lg disabled:opacity-50 transition-all flex items-center justify-center gap-2"
                                >
                                    {loading ? <LoaderIcon /> : 'Crear Correo Atomic Mail'}
                                </button>
                            </div>
                        )}

                        {/* Paso 3: Correo Creado */}
                        {step === 3 && emailData && (
                            <div className="step-indicator bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-8 space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold mb-2">Paso 3: Correo Creado ✓</h2>
                                    <p className="text-slate-400 text-sm">Tu correo Atomic Mail ha sido creado. Descarga las credenciales.</p>
                                </div>

                                <div className="p-6 rounded-lg bg-green-900/20 border border-green-500/30 space-y-4">
                                    <div className="space-y-3">
                                        <div>
                                            <p className="text-slate-400 text-sm">📧 Email</p>
                                            <p className="font-mono font-bold text-green-400">{emailData.email}</p>
                                        </div>
                                        <div>
                                            <p className="text-slate-400 text-sm">🔐 Contraseña</p>
                                            <p className="font-mono font-bold text-green-400">{"•".repeat(emailData.password.length)}</p>
                                        </div>
                                    </div>

                                    <button
                                        onClick={() => copyToClipboard(emailData.email, 'email')}
                                        className="w-full py-2 px-4 rounded-lg font-bold text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:shadow-lg transition-all flex items-center justify-center gap-2 text-sm"
                                    >
                                        {copied === 'email' ? (
                                            <>
                                                <CheckIcon />
                                                Email Copiado
                                            </>
                                        ) : (
                                            <>
                                                <CopyIcon />
                                                Copiar Email
                                            </>
                                        )}
                                    </button>
                                </div>

                                <div className="p-4 rounded-lg bg-blue-900/20 border border-blue-700/50 text-blue-200 text-sm space-y-2">
                                    <strong>⚠️ Instrucciones SAT:</strong>
                                    <ol className="list-decimal list-inside space-y-1">
                                        <li>Ve a <strong>sat.gob.mx</strong> → "Cita - Inscripción"</li>
                                        <li>Completa el formulario con tus datos (arriba)</li>
                                        <li>En el campo de correo: <code className="bg-blue-900/30 px-2 py-1 rounded">{emailData.email}</code></li>
                                        <li>Cuando llegue el código, verifica en <strong>atomicmail.io</strong></li>
                                    </ol>
                                </div>

                                <button
                                    onClick={descargarCredenciales}
                                    className="w-full py-3 px-4 rounded-lg font-bold text-white bg-gradient-to-r from-green-600 to-emerald-600 hover:shadow-lg pulse-button transition-all flex items-center justify-center gap-2"
                                >
                                    <DownloadIcon />
                                    Descargar Credenciales
                                </button>
                            </div>
                        )}

                        {/* Paso 4: Completado */}
                        {step === 4 && (
                            <div className="step-indicator bg-slate-800/50 backdrop-blur border border-slate-700 rounded-2xl p-8 space-y-6 text-center">
                                <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-900/30 border-2 border-green-500">
                                    <CheckCircleIcon />
                                </div>
                                <h2 className="text-3xl font-bold">¡Listo!</h2>
                                <p className="text-slate-400">Archivo descargado. Ya puedes proceder al SAT.</p>
                                
                                <div className="p-6 rounded-lg bg-green-900/20 border border-green-500/50 space-y-3 text-left">
                                    <h3 className="font-bold text-lg">Próximos pasos:</h3>
                                    <ul className="space-y-2 text-sm text-slate-300">
                                        <li>✓ CURP validado contra rfc.gob.mx</li>
                                        <li>✓ Correo Atomic Mail creado</li>
                                        <li>✓ Credenciales descargadas</li>
                                        <li>→ Accede a sat.gob.mx con los datos</li>
                                        <li>→ Ingresa el correo en el formulario</li>
                                        <li>→ Recibe el código en Atomic Mail</li>
                                        <li>→ ¡Tu cita estará lista!</li>
                                    </ul>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SATCitaApp />);
    </script>
</body>
</html>
